name: Deploy Supabase Functions

on:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy functions
        run: |
          supabase functions deploy pin-login --no-verify-jwt
          supabase functions deploy approve-leave --no-verify-jwt
          supabase functions deploy accrue-leave --no-verify-jwt
          supabase functions deploy create-employee --no-verify-jwt
          supabase functions deploy manage-employee-auth --no-verify-jwt
          supabase functions deploy send-notification --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
